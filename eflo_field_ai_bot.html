<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<link rel="manifest" href="/manifest_bot.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="現場AIBot">
<meta name="theme-color" content="#00c6a2">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>EFLO FIELD AI — 現場支援Bot</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap');

:root {
  --bg: #0d0f14;
  --bg2: #13161e;
  --bg3: #1a1e28;
  --surface: #20253200;
  --border: rgba(255,255,255,0.06);
  --border2: rgba(255,255,255,0.12);
  --accent: #00c6a2;
  --accent2: #00e8bc;
  --accent-dim: rgba(0,198,162,0.12);
  --accent-dim2: rgba(0,198,162,0.06);
  --amber: #f5a623;
  --red: #ff4d6a;
  --blue: #4a9eff;
  --text: #e2e8f0;
  --text2: #7a8599;
  --text3: #3d4557;
  --mono: 'JetBrains Mono', monospace;
  --sans: 'Noto Sans JP', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }

body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

/* ===== LAYOUT ===== */
.app {
  display: flex;
  height: 100vh;
  overflow: hidden;
}

/* ===== SIDEBAR ===== */
.sidebar {
  width: 260px;
  min-width: 260px;
  background: var(--bg2);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.logo-area {
  padding: 20px 18px 16px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.logo-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 10px;
}

.logo-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--accent);
  animation: pulse 2s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(0.8); }
}

.logo-label {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.15em;
  color: var(--accent);
  text-transform: uppercase;
}

.logo-title {
  font-size: 18px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: -0.02em;
  margin-bottom: 2px;
}

.logo-sub {
  font-size: 11px;
  color: var(--text2);
}

/* Site selector */
.site-section {
  padding: 14px 14px 8px;
  flex-shrink: 0;
}

.section-label {
  font-size: 10px;
  font-family: var(--mono);
  letter-spacing: 0.1em;
  color: var(--text3);
  text-transform: uppercase;
  margin-bottom: 8px;
  padding: 0 4px;
}

.site-btn {
  width: 100%;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 10px;
  border-radius: 8px;
  border: none;
  background: transparent;
  color: var(--text2);
  cursor: pointer;
  text-align: left;
  font-family: var(--sans);
  font-size: 12px;
  transition: all 0.15s;
  margin-bottom: 2px;
}

.site-btn:hover { background: rgba(255,255,255,0.04); color: var(--text); }
.site-btn.active {
  background: var(--accent-dim);
  color: var(--accent2);
  font-weight: 500;
}

.site-icon {
  width: 26px; height: 26px;
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px;
  flex-shrink: 0;
  background: rgba(255,255,255,0.05);
}

.site-btn.active .site-icon {
  background: rgba(0,198,162,0.15);
}

.site-info {
  flex: 1;
  min-width: 0;
}

.site-name { font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.site-type { font-size: 10px; color: var(--text3); margin-top: 1px; }
.site-btn.active .site-type { color: rgba(0,198,162,0.6); }

/* Quick actions */
.quick-section {
  padding: 14px 14px 8px;
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}

.quick-btn {
  width: 100%;
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 10px;
  border-radius: 8px;
  border: none;
  background: transparent;
  color: var(--text2);
  cursor: pointer;
  font-family: var(--sans);
  font-size: 12px;
  transition: all 0.15s;
  margin-bottom: 2px;
  text-align: left;
}

.quick-btn:hover { background: rgba(255,255,255,0.04); color: var(--text); }

.quick-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
}

.dot-red { background: var(--red); }
.dot-amber { background: var(--amber); }
.dot-blue { background: var(--blue); }
.dot-green { background: var(--accent); }

/* footer */
.sidebar-footer {
  margin-top: auto;
  padding: 12px 14px;
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}

.manager-badge {
  display: flex;
  align-items: center;
  gap: 8px;
}

.manager-avatar {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--accent-dim2), var(--accent-dim));
  border: 1px solid var(--accent-dim);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700;
  color: var(--accent2);
  flex-shrink: 0;
}

.manager-info { flex: 1; }
.manager-name { font-size: 11px; font-weight: 500; color: var(--text); }
.manager-role { font-size: 10px; color: var(--text3); }

/* ===== MAIN CHAT ===== */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--bg);
}

/* Header */
.chat-header {
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  background: var(--bg2);
}

.chat-header-left {
  display: flex;
  align-items: center;
  gap: 10px;
}

.site-indicator {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 4px 10px;
  border-radius: 20px;
  background: var(--accent-dim);
  border: 1px solid rgba(0,198,162,0.2);
}

.indicator-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--accent2);
}

.indicator-text {
  font-size: 11px;
  font-family: var(--mono);
  color: var(--accent2);
}

.chat-title {
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
}

.chat-header-right {
  display: flex;
  align-items: center;
  gap: 8px;
}

.header-btn {
  padding: 5px 12px;
  border-radius: 6px;
  border: 1px solid var(--border2);
  background: transparent;
  color: var(--text2);
  font-size: 11px;
  font-family: var(--sans);
  cursor: pointer;
  transition: all 0.15s;
}

.header-btn:hover { border-color: var(--accent); color: var(--accent); }

/* Messages */
.messages {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 16px;
  scroll-behavior: smooth;
}

.messages::-webkit-scrollbar { width: 4px; }
.messages::-webkit-scrollbar-track { background: transparent; }
.messages::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

/* System message */
.msg-system {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-left: 3px solid var(--accent);
  border-radius: 0 10px 10px 0;
  padding: 12px 14px;
  max-width: 680px;
}

.msg-system-header {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 6px;
}

.msg-system-label {
  font-size: 10px;
  font-family: var(--mono);
  color: var(--accent);
  letter-spacing: 0.08em;
}

.msg-system-text {
  font-size: 13px;
  color: var(--text2);
  line-height: 1.6;
}

/* User message */
.msg-user {
  display: flex;
  justify-content: flex-end;
}

.msg-user-bubble {
  background: var(--accent-dim);
  border: 1px solid rgba(0,198,162,0.2);
  border-radius: 14px 14px 2px 14px;
  padding: 10px 14px;
  max-width: 70%;
  font-size: 13px;
  color: var(--text);
  line-height: 1.5;
}

/* AI message */
.msg-ai {
  display: flex;
  gap: 10px;
  align-items: flex-start;
  max-width: 760px;
}

.ai-avatar {
  width: 30px; height: 30px;
  border-radius: 50%;
  background: var(--accent-dim);
  border: 1px solid rgba(0,198,162,0.3);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  margin-top: 2px;
}

.ai-avatar svg { width: 14px; height: 14px; }

.ai-bubble {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 2px 14px 14px 14px;
  padding: 12px 16px;
  flex: 1;
  font-size: 13px;
  line-height: 1.7;
  color: var(--text);
}

.ai-bubble h4 {
  font-size: 12px;
  font-weight: 500;
  color: var(--accent2);
  margin-bottom: 6px;
  font-family: var(--mono);
  letter-spacing: 0.05em;
}

.ai-bubble ol, .ai-bubble ul {
  padding-left: 18px;
  margin: 8px 0;
}

.ai-bubble li { margin-bottom: 4px; font-size: 13px; }

.ai-ref {
  margin-top: 10px;
  padding-top: 8px;
  border-top: 1px solid var(--border);
  font-size: 10px;
  font-family: var(--mono);
  color: var(--text3);
}

.ai-ref span { color: var(--accent); }

/* Tags */
.tag {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 10px;
  font-family: var(--mono);
  font-weight: 500;
  margin-right: 4px;
  margin-bottom: 4px;
}

.tag-danger { background: rgba(255,77,106,0.15); color: #ff4d6a; border: 1px solid rgba(255,77,106,0.2); }
.tag-warn { background: rgba(245,166,35,0.15); color: #f5a623; border: 1px solid rgba(245,166,35,0.2); }
.tag-info { background: rgba(0,198,162,0.12); color: var(--accent2); border: 1px solid rgba(0,198,162,0.2); }
.tag-gray { background: rgba(255,255,255,0.05); color: var(--text2); border: 1px solid var(--border2); }

/* Typing indicator */
.typing-indicator {
  display: flex;
  gap: 10px;
  align-items: center;
}

.typing-dots {
  display: flex;
  gap: 4px;
  padding: 12px 16px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 2px 14px 14px 14px;
}

.typing-dots span {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--accent);
  animation: bounce 1.2s ease-in-out infinite;
}

.typing-dots span:nth-child(2) { animation-delay: 0.2s; }
.typing-dots span:nth-child(3) { animation-delay: 0.4s; }

@keyframes bounce {
  0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
  30% { transform: translateY(-6px); opacity: 1; }
}

/* Suggested prompts */
.suggestions {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 8px;
}

.suggest-btn {
  padding: 5px 12px;
  border-radius: 16px;
  border: 1px solid var(--border2);
  background: var(--bg3);
  color: var(--text2);
  font-size: 11px;
  font-family: var(--sans);
  cursor: pointer;
  transition: all 0.15s;
}

.suggest-btn:hover {
  border-color: var(--accent);
  color: var(--accent2);
  background: var(--accent-dim2);
}

/* ===== INPUT AREA ===== */
.input-area {
  padding: 14px 20px 18px;
  border-top: 1px solid var(--border);
  background: var(--bg2);
  flex-shrink: 0;
}

.input-wrapper {
  display: flex;
  gap: 10px;
  align-items: flex-end;
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: 12px;
  padding: 10px 12px;
  transition: border-color 0.2s;
}

.input-wrapper:focus-within {
  border-color: rgba(0,198,162,0.4);
}

.chat-input {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  color: var(--text);
  font-family: var(--sans);
  font-size: 13px;
  line-height: 1.5;
  resize: none;
  max-height: 100px;
  min-height: 20px;
}

.chat-input::placeholder { color: var(--text3); }

.send-btn {
  width: 32px; height: 32px;
  border-radius: 8px;
  border: none;
  background: var(--accent);
  color: #000;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: all 0.15s;
}

.send-btn:hover { background: var(--accent2); transform: scale(1.05); }
.send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

.send-btn svg { width: 14px; height: 14px; }

/* Input footer */
.input-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 8px;
}

.input-hint {
  font-size: 10px;
  font-family: var(--mono);
  color: var(--text3);
}

.char-count {
  font-size: 10px;
  font-family: var(--mono);
  color: var(--text3);
}

/* Alert Banner */
.alert-banner {
  margin: 0 20px;
  padding: 8px 14px;
  background: rgba(255,77,106,0.08);
  border: 1px solid rgba(255,77,106,0.2);
  border-radius: 8px;
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 11px;
  color: #ff4d6a;
  font-family: var(--mono);
  display: none;
  flex-shrink: 0;
}

.alert-banner.show { display: flex; }

/* Mobile toggle */
.mobile-toggle {
  display: none;
  width: 36px; height: 36px;
  border: 1px solid var(--border2);
  border-radius: 8px;
  background: transparent;
  color: var(--text2);
  cursor: pointer;
  align-items: center;
  justify-content: center;
}

@media (max-width: 640px) {
  .sidebar {
    position: absolute;
    left: -260px;
    height: 100%;
    z-index: 100;
    transition: left 0.3s;
  }
  .sidebar.open { left: 0; }
  .mobile-toggle { display: flex; }
  .main { width: 100%; }
}

/* Animations */
.msg-enter {
  animation: msgIn 0.25s ease-out;
}

@keyframes msgIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.highlight-text { color: var(--accent2); font-weight: 500; }
.warn-text { color: var(--amber); }
.danger-text { color: var(--red); }
</style>
</head>
<body>

<div class="app">

  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar">
    <div class="logo-area">
      <div class="logo-badge">
        <div class="logo-dot"></div>
        <div class="logo-label">EFLO FIELD AI · TOOL-01</div>
      </div>
      <div class="logo-title">現場支援Bot</div>
      <div class="logo-sub">株式会社イーフロ · 中島誠一 管理</div>
    </div>

    <div class="site-section">
      <div class="section-label">現場を選択</div>
      <button class="site-btn active" onclick="selectSite(this,'p4')" data-site="p4">
        <div class="site-icon">P4</div>
        <div class="site-info">
          <div class="site-name">プロロジスパーク大阪4</div>
          <div class="site-type">物流施設 · ザイマックス管理</div>
        </div>
      </button>
      <button class="site-btn" onclick="selectSite(this,'p5')" data-site="p5">
        <div class="site-icon">P5</div>
        <div class="site-info">
          <div class="site-name">プロロジスパーク大阪5</div>
          <div class="site-type">物流施設 · 8カスタマー</div>
        </div>
      </button>
      <button class="site-btn" onclick="selectSite(this,'lp')" data-site="lp">
        <div class="site-icon">LP</div>
        <div class="site-info">
          <div class="site-name">ロジポート大阪ベイ</div>
          <div class="site-type">大規模物流 · SECOM管理</div>
        </div>
      </button>
      <button class="site-btn" onclick="selectSite(this,'ko')" data-site="ko">
        <div class="site-icon">KO</div>
        <div class="site-info">
          <div class="site-name">コウノイケ物流センター</div>
          <div class="site-type">送迎バス管理 · 夜勤対応</div>
        </div>
      </button>
      <button class="site-btn" onclick="selectSite(this,'ss')" data-site="ss">
        <div class="site-icon">SS</div>
        <div class="site-info">
          <div class="site-name">千趣会</div>
          <div class="site-type">オフィスビル · PHS体制</div>
        </div>
      </button>
      <button class="site-btn" onclick="selectSite(this,'ix')" data-site="ix">
        <div class="site-icon">IX</div>
        <div class="site-info">
          <div class="site-name">インテックス大阪</div>
          <div class="site-type">駐車場警備 · 3エリア</div>
        </div>
      </button>

    </div>

    <div class="quick-section">
      <div class="section-label">緊急クイックアクセス</div>
      <button class="quick-btn" onclick="quickAction('fire')">
        <div class="quick-dot dot-red"></div>
        火災警報 対応手順
      </button>
      <button class="quick-btn" onclick="quickAction('accident')">
        <div class="quick-dot dot-amber"></div>
        車両事故 初動対応
      </button>
      <button class="quick-btn" onclick="quickAction('found')">
        <div class="quick-dot dot-blue"></div>
        拾得物 処理手順
      </button>
      <button class="quick-btn" onclick="quickAction('handover')">
        <div class="quick-dot dot-green"></div>
        引き継ぎ 注意事項
      </button>
    </div>

    <div class="sidebar-footer">
      <div class="manager-badge">
        <div class="manager-avatar">誠</div>
        <div class="manager-info">
          <div class="manager-name">中島 誠一</div>
          <div class="manager-role">管理責任者 · イーフロ</div>
        </div>
      </div>
    </div>
  </div>

  <!-- MAIN CHAT -->
  <div class="main">
    <div class="chat-header">
      <div class="chat-header-left">
        <button class="mobile-toggle" onclick="toggleSidebar()">
          <svg viewBox="0 0 16 16" fill="none" width="16" height="16">
            <path d="M2 4h12M2 8h12M2 12h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>
        <div class="site-indicator">
          <div class="indicator-dot"></div>
          <div class="indicator-text" id="site-indicator">P4 · プロロジスパーク大阪4</div>
        </div>
        <div class="chat-title" id="chat-title">現場AIBot</div>
      </div>
      <div class="chat-header-right">
        <button class="header-btn" onclick="clearChat()">会話をクリア</button>
      </div>
    </div>

    <div class="alert-banner" id="alert-banner">
      <svg width="12" height="12" viewBox="0 0 12 12"><path d="M6 1L11 10H1L6 1Z" fill="currentColor"/><path d="M6 4v3M6 8.5v.5" stroke="#000" stroke-width="1" stroke-linecap="round"/></svg>
      <span id="alert-text"></span>
    </div>

    <div class="messages" id="messages">
      <!-- Initial welcome message injected by JS -->
    </div>

    <div class="input-area">
      <div class="input-wrapper">
        <textarea
          class="chat-input"
          id="user-input"
          placeholder="現場の状況・質問を入力してください..."
          rows="1"
          onkeydown="handleKey(event)"
          oninput="autoResize(this)"
        ></textarea>
        <button class="send-btn" id="send-btn" onclick="sendMessage()">
          <svg viewBox="0 0 14 14" fill="none">
            <path d="M1 7h12M7 1l6 6-6 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
      <div class="input-footer">
        <span class="input-hint">Enter で送信 · Shift+Enter で改行</span>
        <span class="char-count" id="char-count">0 / 500</span>
      </div>
    </div>
  </div>
</div>

<script>
const SITES = {
  p4: {
    label: 'P4 · プロロジスパーク大阪4',
    name: 'プロロジスパーク大阪4',
    manual: `
【プロロジスパーク大阪4 マニュアル要約】
管理会社：ザイマックス関西（渡邊氏・岡瀧氏）
セキュリティ：ALSOK
鍵管理：キーBOX①114本（41set）+ キーBOX②9本（6set）+ ゴミ庫鍵

let currentSite = 'p4';
let isProcessing = false;
let conversationHistory = [];

const SYSTEM_PROMPT_BASE = `あなたは株式会社イーフロの現場警備員向けAI支援システム「EFLO FIELD AI」です。
管理責任者：中島誠一（株式会社イーフロ）

3. 連絡先が必要な事案には必ず連絡先を含める
4. マニュアルに記載がない内容は「管理者（中島誠一）に確認してください」と明示する
5. 回答の最後に必ず「【参照マニュアル】現場名 · 該当セクション」を記載する

7. 人身事故の場合は「救急連絡（119）」を必ず最優先ステップとして先頭に出す
8. 日本語で回答すること

【現場マニュアルデータ】
{SITE_MANUAL}`;

function buildSystemPrompt(siteKey) {
  const site = SITES[siteKey];
  if (!site) return SYSTEM_PROMPT_BASE.replace('{SITE_MANUAL}', '現場情報が見つかりません。');
  return SYSTEM_PROMPT_BASE.replace('{SITE_MANUAL}', site.manual);
}

async function callClaude(userMessage) {
  const systemPrompt = buildSystemPrompt(currentSite);
  conversationHistory.push({ role: 'user', content: userMessage });

  const response = await fetch('/api/claude', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1024,
      system: systemPrompt,
      messages: conversationHistory
    })
  });

  if (!response.ok) {
    const err = await response.json().catch(() => ({}));
    throw new Error(err.error?.message || `API Error ${response.status}`);
  }

  const data = await response.json();
  const assistantMessage = data.content?.[0]?.text || '';
  conversationHistory.push({ role: 'assistant', content: assistantMessage });
  return assistantMessage;
}

function renderMarkdown(text) {
  return text
    .replace(/【(.+?)】/g, '<h4>$1</h4>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/^①|^②|^③|^④|^⑤|^⑥|^⑦|^⑧/gm, m => `<li style="list-style:none;padding-left:0">${m}`)
    .replace(/^・(.+)$/gm, '<li>$1</li>')
    .replace(/\n\n/g, '</p><p>')
    .replace(/（(.+?)）/g, '<span style="color:var(--text2)">（$1）</span>');
}

function addMessage(type, content, site) {

        <svg width="10" height="10" viewBox="0 0 10 10"><circle cx="5" cy="5" r="4" fill="none" stroke="var(--accent)" stroke-width="1"/><circle cx="5" cy="5" r="1.5" fill="var(--accent)"/></svg>
        <span class="msg-system-label">SYSTEM</span>
      </div>
      <div class="msg-system-text">${content}</div>
    `;
    msgs.appendChild(div);
  } else if (type === 'user') {
    const div = document.createElement('div');
    div.className = 'msg-user msg-enter';
    div.innerHTML = `<div class="msg-user-bubble">${content}</div>`;
    msgs.appendChild(div);
  } else if (type === 'ai') {
    const div = document.createElement('div');
    div.className = 'msg-ai msg-enter';
    div.innerHTML = `
      <div class="ai-avatar">

      <div class="ai-avatar">
        <svg viewBox="0 0 14 14" fill="none">
          <circle cx="7" cy="7" r="5.5" stroke="var(--accent2)" stroke-width="1"/>

        </svg>

function removeTyping() {
  const t = document.getElementById('typing-indicator');
  if (t) t.remove();
}

async function sendMessage() {
  const input = document.getElementById('user-input');
  const text = input.value.trim();
  if (!text || isProcessing) return;

  isProcessing = true;
  document.getElementById('send-btn').disabled = true;
  input.value = '';
  input.style.height = 'auto';
  document.getElementById('char-count').textContent = '0 / 500';

  addMessage('user', escapeHtml(text));
  addMessage('typing');

  try {
    const response = await callClaude(text);
    removeTyping();

    const formatted = formatAIResponse(response);
    addMessage('ai', formatted);
  } catch (err) {
    removeTyping();
    let errMsg = '';
    if (err.message.includes('401') || err.message.includes('403')) {
      errMsg = '⚠️ APIキー認証エラー：proxy_server.pyのAPIキーを確認してください。';
    } else if (err.message.includes('Failed to fetch') || err.message.includes('NetworkError') || err.message.includes('fetch')) {
      errMsg = '⚠️ サーバーが起動していません。<br>ターミナルで以下を実行してください：<br><br><code style="background:rgba(0,0,0,.2);padding:4px 8px;border-radius:4px;font-size:11px">cd ~/Downloads/eflo_app && python3 proxy_server.py</code>';
    } else {
      errMsg = `⚠️ エラー：${err.message}`;
    }
    addMessage('ai', `<span style="color:var(--red)">${errMsg}</span>`);

    const demo = getDemoResponse(text, currentSite);
    if (demo) {
      setTimeout(() => addMessage('ai', formatAIResponse(demo)), 800);
    }
  }

  isProcessing = false;
  document.getElementById('send-btn').disabled = false;
  document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
}

function formatAIResponse(text) {
  let html = escapeHtml(text);
  html = html.replace(/【(.+?)】/g, '<h4>$1</h4>');
  html = html.replace(/\n/g, '<br>');
  html = html.replace(/（注意）|（重要）|（緊急）/g, '<span class="tag tag-danger">$&</span>');
  html = html.replace(/（確認）|（要確認）/g, '<span class="tag tag-warn">$&</span>');

  const refMatch = text.match(/【参照マニュアル】.+/);
  if (refMatch) {
    const refText = escapeHtml(refMatch[0]);
    html = html.replace(escapeHtml(refMatch[0]), `<div class="ai-ref"><span>${refText}</span></div>`);
  }

  return html;
}

function selectSite(btn, siteKey) {
  document.querySelectorAll('.site-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentSite = siteKey;
  conversationHistory = [];

  const site = SITES[siteKey];
  document.getElementById('site-indicator').textContent = site.label;

  const msgs = document.getElementById('messages');
  msgs.innerHTML = '';
  showWelcome(siteKey);
  document.getElementById('sidebar').classList.remove('open');
}

function showWelcome(siteKey) {
  const site = SITES[siteKey];
  const suggestions = getSuggestions(siteKey);

  addMessage('system', `
    現場を <strong style="color:var(--accent2)">${site.name}</strong> に切り替えました。<br>
    このAIは ${site.name} のマニュアルデータを参照して回答します。<br>
    業務中に発生した事案・手順確認・緊急対応など、何でも日本語でお聞きください。
    <div class="suggestions" style="margin-top:10px">
      ${suggestions.map(s => `<button class="suggest-btn" onclick="useSuggestion('${s}')">${s}</button>`).join('')}
    </div>
  `);
}

function getSuggestions(siteKey) {
  const map = {
    p4: ['拾得物があった時の手順は？', '火災警報が鳴った時の対応は？', '鍵の引き継ぎ手順を教えて', 'テナント受付時間を教えて'],

function useSuggestion(text) {
  document.getElementById('user-input').value = text;
  sendMessage();
}

function quickAction(type) {
  const actions = {
    fire: '火災警報が発報しました。今すぐの対応手順を教えてください。',
    accident: '車両事故が発生しました。初動対応の手順を教えてください。',
    found: '拾得物（財布）を発見しました。処理手順を教えてください。',
    handover: '引き継ぎの際に注意すべき事項を教えてください。'
  };
  document.getElementById('user-input').value = actions[type] || '';
  sendMessage();
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
  const len = el.value.length;
  document.getElementById('char-count').textContent = `${len} / 500`;
  if (len > 450) {
    document.getElementById('char-count').style.color = 'var(--amber)';
  } else {
    document.getElementById('char-count').style.color = 'var(--text3)';
  }
}

function clearChat() {
  conversationHistory = [];
  document.getElementById('messages').innerHTML = '';
  showWelcome(currentSite);
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
}

function escapeHtml(text) {
  return text
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}
